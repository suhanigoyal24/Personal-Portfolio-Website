{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2>Welcome, {{ request.user.username }}</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ pform.as_p }}
    <button type="submit" class="btn btn-success">Save Profile</button>
  </form>
  <a href="{% url 'logout' %}" class="btn btn-danger mt-3">Logout</a>
</div>
{% endblock %}
